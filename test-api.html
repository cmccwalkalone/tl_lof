<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API测试</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    .test-item { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .success { background: #d4edda; border-color: #28a745; }
    .error { background: #f8d7da; border-color: #dc3545; }
    .pending { background: #fff3cd; border-color: #ffc107; }
    h1 { color: #333; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🔍 API连接测试</h1>
  <p>点击按钮测试各个API是否正常工作</p>

  <div class="test-item pending" id="test1">
    <h3>1. 腾讯股票API (基金价格)</h3>
    <p>测试: https://qt.gtimg.cn/q=sh501312</p>
    <button onclick="testTencentAPI()">测试</button>
    <pre id="result1">等待测试...</pre>
  </div>

  <div class="test-item pending" id="test2">
    <h3>2. 天天基金API (基金净值)</h3>
    <p>测试: https://fundgz.1234567.com.cn/js/501312.js</p>
    <button onclick="testTiantianAPI()">测试</button>
    <pre id="result2">等待测试...</pre>
  </div>

  <div class="test-item pending" id="test3">
    <h3>3. CORS代理测试</h3>
    <p>测试: https://corsproxy.io/? + 腾讯API</p>
    <button onclick="testCorsProxy()">测试</button>
    <pre id="result3">等待测试...</pre>
  </div>

  <div class="test-item pending" id="test4">
    <h3>4. 完整基金数据获取</h3>
    <p>测试单个基金的所有数据</p>
    <button onclick="testFullFetch()">测试</button>
    <pre id="result4">等待测试...</pre>
  </div>

  <script>
    async function testTencentAPI() {
      const item = document.getElementById('test1');
      const result = document.getElementById('result1');
      item.className = 'test-item pending';
      result.textContent = '正在测试...';

      try {
        // 直接访问（可能会失败，因为CORS）
        const response = await fetch('https://qt.gtimg.cn/q=sh501312');
        const text = await response.text();
        item.className = 'test-item success';
        result.textContent = '✅ 成功!\n' + text.substring(0, 200);
      } catch (e) {
        item.className = 'test-item error';
        result.textContent = '❌ 失败: ' + e.message;
      }
    }

    async function testTiantianAPI() {
      const item = document.getElementById('test2');
      const result = document.getElementById('result2');
      item.className = 'test-item pending';
      result.textContent = '正在测试...';

      try {
        const response = await fetch('https://fundgz.1234567.com.cn/js/501312.js?rt=' + Date.now(), {
          headers: { 'Referer': 'https://fund.eastmoney.com/' }
        });
        const text = await response.text();
        item.className = 'test-item success';
        result.textContent = '✅ 成功!\n' + text.substring(0, 200);
      } catch (e) {
        item.className = 'test-item error';
        result.textContent = '❌ 失败: ' + e.message;
      }
    }

    async function testCorsProxy() {
      const item = document.getElementById('test3');
      const result = document.getElementById('result3');
      item.className = 'test-item pending';
      result.textContent = '正在测试...';

      try {
        const url = 'https://corsproxy.io/?' + encodeURIComponent('https://qt.gtimg.cn/q=sh501312');
        const response = await fetch(url);
        const text = await response.text();
        item.className = 'test-item success';
        result.textContent = '✅ CORS代理成功!\n' + text.substring(0, 200);
      } catch (e) {
        item.className = 'test-item error';
        result.textContent = '❌ CORS代理失败: ' + e.message;
      }
    }

    async function testFullFetch() {
      const item = document.getElementById('test4');
      const result = document.getElementById('result4');
      item.className = 'test-item pending';
      result.textContent = '正在测试...\n这可能需要几秒钟';

      try {
        // 测试获取基金数据
        const code = '501312';
        const marketCode = 'sh' + code;
        const priceUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://qt.gtimg.cn/q=' + marketCode);

        // 获取价格
        const priceResponse = await fetch(priceUrl);
        const priceText = await priceResponse.text();

        // 获取净值
        const navUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now());
        const navResponse = await fetch(navUrl, {
          headers: { 'Referer': 'https://fund.eastmoney.com/' }
        });
        const navText = await navResponse.text();

        item.className = 'test-item success';
        result.textContent = '✅ 成功获取数据!\n\n价格数据:\n' + priceText.substring(0, 150) + '\n\n净值数据:\n' + navText.substring(0, 150);
      } catch (e) {
        item.className = 'test-item error';
        result.textContent = '❌ 失败: ' + e.message;
      }
    }

    // 页面加载时自动测试
    window.onload = function() {
      setTimeout(testCorsProxy, 1000);
    };
  </script>
</body>
</html>
